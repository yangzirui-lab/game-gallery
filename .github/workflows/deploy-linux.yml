name: Deploy Frontend to Linux Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'games.json'
      - 'games/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      # ===== 主前端 apps/web =====
      - name: Build web frontend
        working-directory: ./apps/web
        env:
          VITE_BASE_PATH: /
          VITE_API_URL: https://degenerates.site
        run: npm run build

      - name: Deploy web to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
          publish_branch: dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web build ${{ github.sha }}'

      - name: Push web to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: './apps/web/dist/*'
          target: '/tmp/game-gallery-frontend/'
          strip_components: 3
          rm: true
          timeout: 15m
          command_timeout: 15m

      # ===== fund-tracker 子前端 apps/fund =====
      - name: Build fund frontend
        working-directory: ./apps/fund
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Push fund to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: './apps/fund/dist/*'
          target: '/tmp/fund-frontend/'
          strip_components: 3
          rm: true
          timeout: 10m
          command_timeout: 10m

      # ===== 服务器侧部署 =====
      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 5m
          command_timeout: 5m
          script: |
            set -e

            # ----- web (game-gallery) -----
            if [ -d /tmp/game-gallery-frontend ]; then
              echo "Deploying web frontend..."
              sudo mkdir -p /opt/game-gallery/web/dist
              sudo rm -rf /opt/game-gallery/web/dist/*
              sudo cp -r /tmp/game-gallery-frontend/* /opt/game-gallery/web/dist/
              rm -rf /tmp/game-gallery-frontend
              echo "✅ web → /opt/game-gallery/web/dist"
            fi

            # ----- fund (fund-tracker frontend) -----
            if [ -d /tmp/fund-frontend ]; then
              echo "Deploying fund frontend..."
              sudo mkdir -p /opt/fund-tracker/web/dist
              sudo rm -rf /opt/fund-tracker/web/dist/*
              sudo cp -r /tmp/fund-frontend/* /opt/fund-tracker/web/dist/
              rm -rf /tmp/fund-frontend
              echo "✅ fund → /opt/fund-tracker/web/dist"
            fi

      - name: Done
        run: |
          echo "Deployment completed."
          echo "  web:  https://degenerates.site"
          echo "  fund: https://fund.degenerates.site"
