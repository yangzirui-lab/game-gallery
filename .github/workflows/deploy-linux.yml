name: Deploy Frontend to Linux Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'games.json'
      - 'games/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: '强制 build/deploy 全部（绕过 paths-filter）'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      home: ${{ steps.filter.outputs.home }}
      fund: ${{ steps.filter.outputs.fund }}
      godot: ${{ steps.filter.outputs.godot }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/game-gallery/**'
              - '!apps/game-gallery/public/godot-tower-defense/**'
              - 'packages/auth/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy-linux.yml'
            home:
              - 'apps/home/**'
              - 'packages/auth/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy-linux.yml'
            fund:
              - 'apps/fund/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy-linux.yml'
            godot:
              - 'apps/game-gallery/public/godot-tower-defense/**'

  build-and-deploy:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_ALL: ${{ github.event.inputs.force_all == 'true' }}
      WEB_CHANGED: ${{ needs.changes.outputs.web }}
      HOME_CHANGED: ${{ needs.changes.outputs.home }}
      FUND_CHANGED: ${{ needs.changes.outputs.fund }}
      GODOT_CHANGED: ${{ needs.changes.outputs.godot }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: env.WEB_CHANGED == 'true' || env.HOME_CHANGED == 'true' || env.FUND_CHANGED == 'true' || env.FORCE_ALL == 'true'
        run: npm ci
        env:
          CI: true

      # ===== 主页 apps/home =====
      - name: Build home frontend
        if: env.HOME_CHANGED == 'true' || env.FORCE_ALL == 'true'
        working-directory: ./apps/home
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy home to home-dist branch
        if: env.HOME_CHANGED == 'true' || env.FORCE_ALL == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/home/dist
          publish_branch: home-dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy home build ${{ github.sha }}'

      # ===== game-gallery apps/game-gallery =====
      - name: Build web frontend
        if: env.WEB_CHANGED == 'true' || env.FORCE_ALL == 'true'
        working-directory: ./apps/game-gallery
        env:
          VITE_BASE_PATH: /game-gallery/
          VITE_API_URL: https://degenerates.site
        run: npm run build

      - name: Deploy web to game-gallery-dist branch
        if: env.WEB_CHANGED == 'true' || env.FORCE_ALL == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/game-gallery/dist
          publish_branch: game-gallery-dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy game-gallery build ${{ github.sha }}'

      # ===== fund 子前端 apps/fund (挂载到 degenerates.site/fund/) =====
      - name: Build fund frontend
        if: env.FUND_CHANGED == 'true' || env.FORCE_ALL == 'true'
        working-directory: ./apps/fund
        env:
          VITE_BASE_PATH: /fund/
          # API 同源，相对路径就够（前端 fetch /api/fund/...）
          VITE_API_URL: ''
        run: npm run build

      - name: Deploy fund to fund-dist branch
        if: env.FUND_CHANGED == 'true' || env.FORCE_ALL == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/fund/dist
          publish_branch: fund-dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy fund build ${{ github.sha }}'

      # ===== godot 资源（67MB，独立流，仅在文件变化时触发）=====
      - name: Pack godot assets
        if: env.GODOT_CHANGED == 'true' || env.FORCE_ALL == 'true'
        run: |
          mkdir -p godot-staging
          cp -R apps/game-gallery/public/godot-tower-defense godot-staging/

      - name: Deploy godot to godot-assets branch
        if: env.GODOT_CHANGED == 'true' || env.FORCE_ALL == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./godot-staging
          publish_branch: godot-assets
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy godot assets ${{ github.sha }}'

      # ===== 服务器侧同步 =====
      - name: Deploy to Linux Server
        if: env.WEB_CHANGED == 'true' || env.HOME_CHANGED == 'true' || env.FUND_CHANGED == 'true' || env.GODOT_CHANGED == 'true' || env.FORCE_ALL == 'true'
        uses: appleboy/ssh-action@master
        env:
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
          HOME_CHANGED: ${{ needs.changes.outputs.home }}
          FUND_CHANGED: ${{ needs.changes.outputs.fund }}
          GODOT_CHANGED: ${{ needs.changes.outputs.godot }}
          FORCE_ALL: ${{ github.event.inputs.force_all == 'true' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: WEB_CHANGED,HOME_CHANGED,FUND_CHANGED,GODOT_CHANGED,FORCE_ALL
          timeout: 25m
          command_timeout: 25m
          script: |
            set -e

            # 通用下载（小分支：codeload 优先）
            download_branch_to() {
              local repo="$1" branch="$2" target="$3"
              local tmp="/tmp/${branch}-$$.tar.gz"
              local urls=(
                "https://codeload.github.com/${repo}/tar.gz/refs/heads/${branch}"
                "https://ghfast.top/https://github.com/${repo}/archive/refs/heads/${branch}.tar.gz"
                "https://ghproxy.com/https://github.com/${repo}/archive/refs/heads/${branch}.tar.gz"
              )
              for url in "${urls[@]}"; do
                echo "==== try: $url"
                if curl -fsSL --retry 3 --retry-delay 5 --max-time 300 -o "$tmp" "$url"; then
                  mkdir -p "$target"
                  rm -rf "$target"/*
                  tar -xzf "$tmp" --strip-components=1 -C "$target"
                  rm -f "$tmp"
                  echo "✅ $branch → $target"
                  return 0
                fi
                rm -f "$tmp"
                echo "⚠️  $url 失败，尝试下一个"
              done
              echo "❌ $branch 全部源失败"
              return 1
            }

            # godot 专用（67MB，国内访问 codeload 直连超慢，优先走镜像）
            download_godot_to() {
              local repo="$1" target="$2"
              local tmp="/tmp/godot-assets-$$.tar.gz"
              local urls=(
                "https://ghfast.top/https://github.com/${repo}/archive/refs/heads/godot-assets.tar.gz"
                "https://ghproxy.com/https://github.com/${repo}/archive/refs/heads/godot-assets.tar.gz"
                "https://codeload.github.com/${repo}/tar.gz/refs/heads/godot-assets"
              )
              for url in "${urls[@]}"; do
                echo "==== godot try: $url"
                if curl -fsSL --retry 2 --retry-delay 5 --max-time 1200 \
                       --speed-time 30 --speed-limit 10240 \
                       -o "$tmp" "$url"; then
                  mkdir -p "$target"
                  rm -rf "$target"/*
                  tar -xzf "$tmp" --strip-components=1 -C "$target"
                  rm -f "$tmp"
                  echo "✅ godot → $target"
                  return 0
                fi
                rm -f "$tmp"
                echo "⚠️  godot 源失败，换下一个"
              done
              echo "❌ godot 全部源失败"
              return 1
            }

            REPO=${{ github.repository }}

            if [ "$HOME_CHANGED" = "true" ] || [ "$FORCE_ALL" = "true" ]; then
              download_branch_to "$REPO" home-dist /opt/degenerates-frontend/home/dist
            else
              echo "skip home (no changes)"
            fi

            if [ "$FUND_CHANGED" = "true" ] || [ "$FORCE_ALL" = "true" ]; then
              download_branch_to "$REPO" fund-dist /opt/fund-tracker/web/dist
            else
              echo "skip fund (no changes)"
            fi

            if [ "$WEB_CHANGED" = "true" ] || [ "$FORCE_ALL" = "true" ]; then
              download_branch_to "$REPO" game-gallery-dist /opt/degenerates-frontend/game-gallery/dist
            else
              echo "skip web (no changes)"
            fi

            # 服务器若没拿过 godot 资源，即使 godot 没变化也强制拉一次（首次部署兜底）
            if [ "$GODOT_CHANGED" = "true" ] || [ "$FORCE_ALL" = "true" ] \
               || [ ! -d /opt/godot-assets/godot-tower-defense ]; then
              download_godot_to "$REPO" /opt/godot-assets \
                || echo "⚠️ godot-assets 分支不可用，可在服务器手动跑一次：curl -fL https://ghfast.top/https://github.com/${REPO}/archive/refs/heads/godot-assets.tar.gz | tar xz --strip-components=1 -C /opt/godot-assets"
            else
              echo "skip godot (no changes)"
            fi

      - name: Done
        run: |
          echo "Deployment summary:"
          echo "  home:  ${{ env.HOME_CHANGED == 'true' && '✓ deployed' || 'skipped' }}"
          echo "  web:   ${{ env.WEB_CHANGED == 'true' && '✓ deployed' || 'skipped' }}"
          echo "  fund:  ${{ env.FUND_CHANGED == 'true' && '✓ deployed' || 'skipped' }}"
          echo "  godot: ${{ env.GODOT_CHANGED == 'true' && '✓ deployed' || 'skipped' }}"
