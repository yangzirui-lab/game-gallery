name: Deploy Frontend to Linux Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'games.json'
      - 'games/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      # ===== 主前端 apps/web =====
      - name: Build web frontend
        working-directory: ./apps/web
        env:
          VITE_BASE_PATH: /
          VITE_API_URL: https://degenerates.site
        run: npm run build

      - name: Deploy web to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
          publish_branch: dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web build ${{ github.sha }}'

      # ===== fund-tracker 子前端 apps/fund =====
      - name: Build fund frontend
        working-directory: ./apps/fund
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy fund to fund-dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/fund/dist
          publish_branch: fund-dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy fund build ${{ github.sha }}'

      # ===== 服务器侧部署：git pull（跨境比 SCP 稳得多） =====
      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e

            # 大陆访问 GitHub 不稳，git clone 71MB 容易中断。
            # 改用 archive tarball + curl 下载（带 retry 与 ghproxy fallback）。
            download_branch_to() {
              local repo="$1" branch="$2" target="$3"
              local tmp="/tmp/${branch}-$$.tar.gz"
              local urls=(
                "https://codeload.github.com/${repo}/tar.gz/refs/heads/${branch}"
                "https://ghfast.top/https://github.com/${repo}/archive/refs/heads/${branch}.tar.gz"
                "https://ghproxy.com/https://github.com/${repo}/archive/refs/heads/${branch}.tar.gz"
              )
              for url in "${urls[@]}"; do
                echo "==== try: $url"
                if curl -fsSL --retry 3 --retry-delay 5 --max-time 600 -o "$tmp" "$url"; then
                  mkdir -p "$target"
                  rm -rf "$target"/*
                  tar -xzf "$tmp" --strip-components=1 -C "$target"
                  rm -f "$tmp"
                  echo "✅ $branch → $target"
                  return 0
                fi
                rm -f "$tmp"
                echo "⚠️  $url 失败，尝试下一个"
              done
              echo "❌ $branch 全部源失败"
              return 1
            }

            REPO=${{ github.repository }}
            FT_REPO=YBoomer/fund-tracker

            # ----- fund 静态先（小且关键）-----
            download_branch_to "$REPO" fund-dist /opt/fund-tracker/web/dist

            # ----- fund-tracker docker container（只下 deploy/ + data/，不需要全 repo）-----
            FT=/opt/fund-tracker
            mkdir -p "$FT"
            # 用 archive 同步 fund-tracker main 的 deploy/ 与 data/（用 .repo 临时目录，再选择性 cp）
            download_branch_to "$FT_REPO" main "$FT/.repo"
            cp -R "$FT/.repo/data/." "$FT/data/" 2>/dev/null || true
            cp "$FT/.repo/deploy/docker-compose.yml" "$FT/"
            cp "$FT/.repo/deploy/deploy.sh"          "$FT/"
            cp "$FT/.repo/deploy/sync-data.sh"       "$FT/"
            chmod +x "$FT/deploy.sh" "$FT/sync-data.sh"
            rm -rf "$FT/.repo"

            echo "📥 docker pull fund-tracker"
            docker pull ghcr.io/yboomer/fund-tracker:latest

            echo "🔄 docker compose up"
            cd "$FT"
            IMAGE=ghcr.io/yboomer/fund-tracker:latest docker compose up -d --force-recreate

            sleep 3
            docker compose ps fund-tracker || true
            echo "✅ fund-tracker container deployed"

            # ----- web 静态最后（71MB 即使慢也不影响 fund 已部署）-----
            download_branch_to "$REPO" dist /opt/game-gallery/web/dist || \
              echo "⚠️ web 同步失败，但 fund 已成功部署"

      - name: Done
        run: |
          echo "Deployment completed."
          echo "  web:  https://degenerates.site"
          echo "  fund: https://fund.degenerates.site"
