name: Deploy Frontend to Linux Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'games.json'
      - 'games/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      # ===== 主前端 apps/web =====
      - name: Build web frontend
        working-directory: ./apps/web
        env:
          VITE_BASE_PATH: /
          VITE_API_URL: https://degenerates.site
        run: npm run build

      - name: Deploy web to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
          publish_branch: dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web build ${{ github.sha }}'

      # ===== fund-tracker 子前端 apps/fund =====
      - name: Build fund frontend
        working-directory: ./apps/fund
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy fund to fund-dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/fund/dist
          publish_branch: fund-dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy fund build ${{ github.sha }}'

      # ===== 服务器侧部署：仅 frontend 静态文件，后端逻辑由 degenerates-backend 容器承担 =====
      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e

            # 大陆访问 GitHub 不稳。用 archive tarball + 镜像 fallback 下载。
            download_branch_to() {
              local repo="$1" branch="$2" target="$3"
              local tmp="/tmp/${branch}-$$.tar.gz"
              local urls=(
                "https://codeload.github.com/${repo}/tar.gz/refs/heads/${branch}"
                "https://ghfast.top/https://github.com/${repo}/archive/refs/heads/${branch}.tar.gz"
                "https://ghproxy.com/https://github.com/${repo}/archive/refs/heads/${branch}.tar.gz"
              )
              for url in "${urls[@]}"; do
                echo "==== try: $url"
                if curl -fsSL --retry 3 --retry-delay 5 --max-time 600 -o "$tmp" "$url"; then
                  mkdir -p "$target"
                  rm -rf "$target"/*
                  tar -xzf "$tmp" --strip-components=1 -C "$target"
                  rm -f "$tmp"
                  echo "✅ $branch → $target"
                  return 0
                fi
                rm -f "$tmp"
                echo "⚠️  $url 失败，尝试下一个"
              done
              echo "❌ $branch 全部源失败"
              return 1
            }

            REPO=${{ github.repository }}

            # fund 静态先（小且关键）
            download_branch_to "$REPO" fund-dist /opt/fund-tracker/web/dist

            # web 静态后（71MB，失败不影响 fund）
            download_branch_to "$REPO" dist /opt/game-gallery/web/dist || \
              echo "⚠️ web 同步失败，但 fund 已成功部署"

      - name: Done
        run: |
          echo "Deployment completed."
          echo "  web:  https://degenerates.site"
          echo "  fund: https://fund.degenerates.site"
